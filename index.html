<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe One - 2D Scroller</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #333;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            color: white;
            text-shadow: 2px 2px 0px #000;
        }
        .health-container {
            width: 250px;
            height: 35px;
            background: #555;
            border: 4px solid #888;
            border-radius: 5px;
            position: relative;
            overflow: hidden;
        }
        .health-bar {
            width: 100%;
            height: 100%;
            background: #4caf50;
            transition: width 0.3s;
        }
        .health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 18px;
        }
        .stats-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
        }
        .attack-prompt {
            position: absolute;
            top: 50px;
            right: 50px;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #555;
        }
        .pause-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #888;
            border: 4px solid #aaa;
            border-radius: 5px;
            pointer-events: auto;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div class="health-container">
            <div class="health-bar" id="healthBar"></div>
            <div class="health-text" id="healthText">100/100</div>
        </div>
        
        <div class="stats-container">
            <div class="stat-item">🍎 <span id="appleCount">8/20</span></div>
            <div class="stat-item">💰 <span id="coinCount">7</span></div>
            <div class="stat-item">📦 <span id="chestCount">1/11</span></div>
            <div class="stat-item">🔥 <span id="rareChestCount">0/2</span></div>
        </div>

        <div class="attack-prompt">
            <div style="font-size: 24px; font-weight: bold; margin-bottom: 10px;">ATTACK</div>
            <div style="font-size: 18px;">X OR SPACE OR K</div>
            <div style="font-size: 14px; margin: 5px 0;">OR</div>
            <div style="font-size: 18px; color: #ffa500;">LEFT MOUSE BUTTON</div>
        </div>

        <div class="pause-btn">
            <div style="width: 10px; height: 25px; background: white; margin: 0 3px;"></div>
            <div style="width: 10px; height: 25px; background: white; margin: 0 3px;"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const healthBar = document.getElementById('healthBar');
        const healthText = document.getElementById('healthText');

        // Game State
        const game = {
            width: 800,
            height: 450,
            gravity: 0.8,
            friction: 0.8,
            groundY: 380,
            cameraX: 0
        };

        // Sprite Sheet Management
        const sprites = {
            hero: new Image()
        };
        sprites.hero.src = 'images/hero-sword.png';

        function resize() {
            const scale = Math.min(window.innerWidth / game.width, window.innerHeight / game.height);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.scale(scale, scale);
        }
        window.addEventListener('resize', resize);
        resize();

        // Input Handling
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousedown', e => { if(e.button === 0) player.attack(); });

        // Sprite Animation System
        class SpriteAnimation {
            constructor(spriteSheet, frameWidth, frameHeight, frames, frameDuration = 10) {
                this.spriteSheet = spriteSheet;
                this.frameWidth = frameWidth;
                this.frameHeight = frameHeight;
                this.frames = frames; // Array of {x, y} coordinates
                this.frameDuration = frameDuration;
                this.currentFrame = 0;
                this.timer = 0;
            }

            update() {
                this.timer++;
                if (this.timer >= this.frameDuration) {
                    this.currentFrame = (this.currentFrame + 1) % this.frames.length;
                    this.timer = 0;
                }
            }

            draw(ctx, x, y, facing = 1) {
                if (!this.spriteSheet.complete) return;

                const frame = this.frames[this.currentFrame];
                ctx.save();
                
                // Flip horizontally if facing left
                if (facing === -1) {
                    ctx.translate(x + this.frameWidth, y);
                    ctx.scale(-1, 1);
                    ctx.drawImage(this.spriteSheet, frame.x, frame.y, this.frameWidth, this.frameHeight, 0, 0, this.frameWidth, this.frameHeight);
                } else {
                    ctx.drawImage(this.spriteSheet, frame.x, frame.y, this.frameWidth, this.frameHeight, x, y, this.frameWidth, this.frameHeight);
                }
                
                ctx.restore();
            }
        }

        class Player {
            constructor() {
                this.x = 100;
                this.y = 200;
                this.width = 48; // Updated to match sprite
                this.height = 64; // Updated to match sprite
                this.vx = 0;
                this.vy = 0;
                this.speed = 5;
                this.jumpStrength = -15;
                this.grounded = false;
                this.facing = 1; // 1 for right, -1 for left
                this.isAttacking = false;
                this.attackTimer = 0;
                this.health = 100;
                
                // Animation states
                this.animations = {
                    idle: new SpriteAnimation(sprites.hero, 48, 64, [
                        {x: 0, y: 0}, {x: 48, y: 0}, {x: 96, y: 0}, {x: 144, y: 0}
                    ], 15),
                    walk: new SpriteAnimation(sprites.hero, 48, 64, [
                        {x: 0, y: 64}, {x: 48, y: 64}, {x: 96, y: 64}, {x: 144, y: 64}, 
                        {x: 192, y: 64}, {x: 240, y: 64}
                    ], 8),
                    jump: new SpriteAnimation(sprites.hero, 48, 64, [
                        {x: 0, y: 128}, {x: 48, y: 128}
                    ], 20),
                    attack: new SpriteAnimation(sprites.hero, 48, 64, [
                        {x: 0, y: 192}, {x: 48, y: 192}, {x: 96, y: 192}, {x: 144, y: 192}
                    ], 6)
                };
                
                this.currentAnimation = this.animations.idle;
            }

            update() {
                // Movement
                if (keys['ArrowRight'] || keys['KeyD']) {
                    this.vx = this.speed;
                    this.facing = 1;
                } else if (keys['ArrowLeft'] || keys['KeyA']) {
                    this.vx = -this.speed;
                    this.facing = -1;
                } else {
                    this.vx *= game.friction;
                }

                // Jump
                if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && this.grounded) {
                    this.vy = this.jumpStrength;
                    this.grounded = false;
                }

                // Attack
                if ((keys['KeyX'] || keys['KeyK']) && !this.isAttacking) {
                    this.attack();
                }

                if (this.isAttacking) {
                    this.attackTimer--;
                    if (this.attackTimer <= 0) this.isAttacking = false;
                }

                // Physics
                this.vy += game.gravity;
                this.x += this.vx;
                this.y += this.vy;

                // Ground collision
                if (this.y + this.height > game.groundY) {
                    this.y = game.groundY - this.height;
                    this.vy = 0;
                    this.grounded = true;
                }

                // Animation State Logic
                this.updateAnimation();

                // Camera follow
                game.cameraX = this.x - 200;
            }

            attack() {
                this.isAttacking = true;
                this.attackTimer = 15;
            }

            updateAnimation() {
                // Determine which animation to play
                if (this.isAttacking) {
                    this.currentAnimation = this.animations.attack;
                } else if (!this.grounded) {
                    this.currentAnimation = this.animations.jump;
                } else if (Math.abs(this.vx) > 0.1) {
                    this.currentAnimation = this.animations.walk;
                } else {
                    this.currentAnimation = this.animations.idle;
                }

                // Update the current animation
                this.currentAnimation.update();
            }

            draw() {
                // Draw the current animation
                this.currentAnimation.draw(ctx, this.x - game.cameraX, this.y, this.facing);
            }
        }

        const player = new Player();

        function drawBackground() {
            // Sky
            ctx.fillStyle = '#a8ccd7';
            ctx.fillRect(0, 0, game.width * 5, game.height);

            // Far Hills (Parallax)
            ctx.fillStyle = '#86a683';
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.arc(i * 400 - (game.cameraX * 0.2), 350, 200, 0, Math.PI * 2);
                ctx.fill();
            }

            // Trees
            ctx.fillStyle = '#4d633d';
            for (let i = 0; i < 10; i++) {
                const tx = i * 300 - (game.cameraX * 0.5);
                ctx.fillRect(tx, 250, 40, 130); // trunk
                ctx.beginPath();
                ctx.arc(tx + 20, 220, 60, 0, Math.PI * 2); // leaves
                ctx.fill();
            }
        }

        function drawGround() {
            ctx.save();
            ctx.translate(-game.cameraX, 0);
            
            // Grass top
            ctx.fillStyle = '#789c44';
            ctx.fillRect(game.cameraX, game.groundY, game.width + 1000, 20);
            
            // Dirt bottom
            ctx.fillStyle = '#4a3828';
            ctx.fillRect(game.cameraX, game.groundY + 20, game.width + 1000, 200);

            // Stone walls (Like the image)
            ctx.fillStyle = '#555';
            for(let i=0; i<10; i++) {
                ctx.fillRect(i * 600 + 400, game.groundY - 80, 80, 80);
                ctx.strokeStyle = '#333';
                ctx.strokeRect(i * 600 + 400, game.groundY - 80, 80, 80);
            }

            ctx.restore();
        }

        function updateUI() {
            healthBar.style.width = player.health + '%';
            healthText.innerText = `${Math.floor(player.health)}/100`;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            player.update();
            updateUI();

            drawBackground();
            drawGround();
            player.draw();

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
